<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WSRicardo Games - Caça-Palavras</title>
    <link rel="stylesheet" href="../assets/css/games-theme.css">
</head>
<body class="game-page">

    <header class="site-header">
        <div class="container">
            <a href="../../index.html" class="logo">
                <span>WSRicardo://Games</span>
            </a>
            <nav class="main-nav">
                <a href="../../index.html">Home</a>
                <a href="../../projetos.html">Projetos</a>
                <a href="../../blog/">Blog</a>
                <a href="../../games/index.html" class="active">Games</a>
            </nav>
        </div>
    </header>

    <main>
        <section id="game-section" class="section">
            <div class="container">
                <div class="game-hero">
                    <h1>Caça-Palavras Web</h1>
                    <p class="page-intro">O universo das palavras aguarda. Prepare-se para decifrar os enigmas em uma experiência nova.</p>
                    <p class="subtitle">Encontre todas as palavras escondidas</p>
                </div>

                <div class="game-stage">
                    <div class="board-panel">
                        <div class="board-wrapper">
                            <div id="grid" class="grid"></div>
                        </div>
                    </div>

                    <aside class="sidebar">
                        <h3>Palavras</h3>
                        <ul id="word-list" class="word-list"></ul>
                        <button class="btn" id="restart-btn" type="button">Novo Jogo</button>
                    </aside>
                </div>
            </div>
        </section>
    </main>

    <footer class="site-footer">
        <div class="container">
            <div class="footer-content">
                <p>&copy; 2026 Wandeson Ricardo. Todos os direitos reservados.</p>
            </div>
        </div>
    </footer>

    <script>
        // Configurações do Jogo
        const GRID_SIZE = 12;
        const WORDS = ["CODIGO", "DESIGN", "FRONTEND", "LOGICA", "FUTURO", "CRIATIVO", "SISTEMA", "MODERNO"];
        const ALPHABET = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";

        let grid = [];
        let wordsToFind = [];
        let foundWords = 0;

        // Variáveis para a mecânica de seleção
        let isSelecting = false;
        let startCell = null;
        let currentSelection = [];

        // Elementos do DOM
        const gridElement = document.getElementById('grid');
        const wordListElement = document.getElementById('word-list');
        const restartBtn = document.getElementById('restart-btn');

        // Inicializa o jogo
        function initGame() {
            grid = Array.from({ length: GRID_SIZE }, () => Array(GRID_SIZE).fill(''));
            wordsToFind = [...WORDS];
            foundWords = 0;

            placeWords();
            fillEmptyCells();
            renderGrid();
            renderWordList();
        }

        // Tenta posicionar todas as palavras na matriz
        function placeWords() {
            wordsToFind.forEach(word => {
                let placed = false;
                let attempts = 0;

                while (!placed && attempts < 100) {
                    // Direções: 0=Horizontal, 1=Vertical, 2=Diagonal
                    const dir = Math.floor(Math.random() * 3);
                    const row = Math.floor(Math.random() * GRID_SIZE);
                    const col = Math.floor(Math.random() * GRID_SIZE);

                    if (canPlaceWord(word, row, col, dir)) {
                        for (let i = 0; i < word.length; i++) {
                            const r = dir === 1 || dir === 2 ? row + i : row;
                            const c = dir === 0 || dir === 2 ? col + i : col;
                            grid[r][c] = word[i];
                        }
                        placed = true;
                    }
                    attempts++;
                }
            });
        }

        // Verifica se a palavra cabe na direção escolhida sem sobrepor letras diferentes
        function canPlaceWord(word, row, col, dir) {
            if (dir === 0 && col + word.length > GRID_SIZE) return false; // Horizontal
            if (dir === 1 && row + word.length > GRID_SIZE) return false; // Vertical
            if (dir === 2 && (row + word.length > GRID_SIZE || col + word.length > GRID_SIZE)) return false; // Diagonal

            for (let i = 0; i < word.length; i++) {
                const r = dir === 1 || dir === 2 ? row + i : row;
                const c = dir === 0 || dir === 2 ? col + i : col;
                const currentCell = grid[r][c];

                if (currentCell !== '' && currentCell !== word[i]) {
                    return false;
                }
            }
            return true;
        }

        // Preenche os espaços vazios com letras aleatórias
        function fillEmptyCells() {
            for (let r = 0; r < GRID_SIZE; r++) {
                for (let c = 0; c < GRID_SIZE; c++) {
                    if (grid[r][c] === '') {
                        grid[r][c] = ALPHABET[Math.floor(Math.random() * ALPHABET.length)];
                    }
                }
            }
        }

        // Renderiza o HTML da grade
        function renderGrid() {
            gridElement.innerHTML = '';
            gridElement.style.gridTemplateColumns = `repeat(${GRID_SIZE}, 1fr)`;

            for (let r = 0; r < GRID_SIZE; r++) {
                for (let c = 0; c < GRID_SIZE; c++) {
                    const cell = document.createElement('div');
                    cell.classList.add('cell');
                    cell.dataset.row = r;
                    cell.dataset.col = c;
                    cell.textContent = grid[r][c];

                    // Eventos de Mouse
                    cell.addEventListener('mousedown', handleMouseDown);
                    cell.addEventListener('mouseenter', handleMouseEnter);

                    gridElement.appendChild(cell);
                }
            }
            // Evento global para soltar o mouse mesmo fora da grade
            document.addEventListener('mouseup', handleMouseUp);
        }

        // Renderiza a lista de palavras na lateral
        function renderWordList() {
            wordListElement.innerHTML = '';
            wordsToFind.forEach(word => {
                const li = document.createElement('li');
                li.id = `word-${word}`;
                li.textContent = word;
                wordListElement.appendChild(li);
            });
        }

        // --- LÓGICA DE INTERAÇÃO E SELEÇÃO ---

        function handleMouseDown(e) {
            isSelecting = true;
            startCell = {
                r: parseInt(e.target.dataset.row),
                c: parseInt(e.target.dataset.col)
            };
            clearSelection();
            selectCell(e.target);
            currentSelection.push(e.target);
        }

        function handleMouseEnter(e) {
            if (!isSelecting) return;

            const currentR = parseInt(e.target.dataset.row);
            const currentC = parseInt(e.target.dataset.col);

            // Verifica se a linha formada é reta (Horizontal, Vertical ou Diagonal Exata)
            const dr = Math.abs(currentR - startCell.r);
            const dc = Math.abs(currentC - startCell.c);

            if (currentR === startCell.r || currentC === startCell.c || dr === dc) {
                clearSelection();
                calculatePath(startCell.r, startCell.c, currentR, currentC);
            }
        }

        function handleMouseUp() {
            if (!isSelecting) return;
            isSelecting = false;

            // Pega a palavra formada
            const selectedWord = currentSelection.map(cell => cell.textContent).join('');
            const reversedWord = selectedWord.split('').reverse().join(''); // Permite selecionar de trás pra frente

            if (wordsToFind.includes(selectedWord) || wordsToFind.includes(reversedWord)) {
                const validWord = wordsToFind.includes(selectedWord) ? selectedWord : reversedWord;
                markAsFound(validWord);
            } else {
                clearSelection();
            }

            startCell = null;
        }

        // Calcula e destaca o caminho entre o primeiro clique e a posição atual do mouse
        function calculatePath(r1, c1, r2, c2) {
            const rowStep = r1 === r2 ? 0 : (r2 > r1 ? 1 : -1);
            const colStep = c1 === c2 ? 0 : (c2 > c1 ? 1 : -1);

            let r = r1;
            let c = c1;

            currentSelection = [];

            // Traça a linha até o destino
            while (true) {
                const cell = document.querySelector(`.cell[data-row="${r}"][data-col="${c}"]`);
                if (cell) {
                    selectCell(cell);
                    currentSelection.push(cell);
                }

                if (r === r2 && c === c2) break;

                r += rowStep;
                c += colStep;
            }
        }

        function selectCell(cell) {
            if (!cell.classList.contains('found')) {
                cell.classList.add('selecting');
            }
        }

        function clearSelection() {
            currentSelection.forEach(cell => {
                cell.classList.remove('selecting');
            });
            currentSelection = [];
        }

        // Marca a palavra como encontrada na grade e na lista
        function markAsFound(word) {
            currentSelection.forEach(cell => {
                cell.classList.remove('selecting');
                cell.classList.add('found');
            });

            const li = document.getElementById(`word-${word}`);
            if (li && !li.classList.contains('struck')) {
                li.classList.add('struck');
                foundWords++;

                if (foundWords === wordsToFind.length) {
                    setTimeout(() => alert('🎉 Parabéns! Você encontrou todas as palavras!'), 500);
                }
            }

            // Remove a palavra do array para não selecionar duas vezes
            wordsToFind = wordsToFind.filter(w => w !== word);
            currentSelection = [];
        }

        // Reiniciar
        restartBtn.addEventListener('click', initGame);

        // Inicia na primeira carga
        initGame();

    </script>

</body>
</html>

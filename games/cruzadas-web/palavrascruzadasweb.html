<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Caça-Palavras Acolhedor</title>
    <style>
        /* Paleta de cores moderna e acolhedora */
        :root {
            --bg-color: #faf7f2;
            --text-main: #4a4a4a;
            --primary: #f4a261;
            --primary-hover: #e76f51;
            --secondary: #2a9d8f;
            --grid-bg: #ffffff;
            --cell-hover: #fdf2e9;
            --selection: rgba(244, 162, 97, 0.4);
            --found: #e9c46a;
            --shadow: 0 8px 30px rgba(0, 0, 0, 0.05);
            --radius: 16px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none; /* Evita selecionar o texto ao arrastar */
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
        }

        h1 {
            font-size: 2.5rem;
            color: var(--primary-hover);
            letter-spacing: -1px;
            margin-bottom: 10px;
        }

        p.subtitle {
            color: #777;
            font-size: 1.1rem;
        }

        .game-container {
            display: flex;
            flex-wrap: wrap;
            gap: 40px;
            justify-content: center;
            align-items: flex-start;
            max-width: 1000px;
            width: 100%;
        }

        /* Grade do Jogo */
        .board-wrapper {
            background: var(--grid-bg);
            padding: 20px;
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            touch-action: none; /* Melhora interações em telas touch */
        }

        .grid {
            display: grid;
            gap: 4px;
            background-color: #eee;
            border: 2px solid #eee;
            border-radius: 8px;
            overflow: hidden;
        }

        .cell {
            width: 40px;
            height: 40px;
            background-color: var(--grid-bg);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            font-weight: 600;
            color: var(--text-main);
            cursor: pointer;
            transition: background-color 0.1s ease, transform 0.1s ease;
        }

        /* Efeitos Visuais das Células */
        .cell:hover {
            background-color: var(--cell-hover);
        }

        .cell.selecting {
            background-color: var(--selection);
            color: var(--primary-hover);
            transform: scale(1.05);
            border-radius: 4px;
        }

        .cell.found {
            background-color: var(--found);
            color: #fff;
            border-radius: 4px;
            animation: pop 0.3s ease-out;
        }

        /* Painel Lateral */
        .sidebar {
            background: var(--grid-bg);
            padding: 30px;
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            min-width: 250px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        h3 {
            color: var(--secondary);
            font-size: 1.5rem;
            border-bottom: 2px solid #f0f0f0;
            padding-bottom: 10px;
        }

        .word-list {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .word-list li {
            font-size: 1.2rem;
            font-weight: 500;
            color: #666;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
        }

        .word-list li::before {
            content: '•';
            color: var(--primary);
            margin-right: 10px;
            font-size: 1.5rem;
        }

        .word-list li.struck {
            text-decoration: line-through;
            color: #bbb;
            transform: scale(0.95);
            transform-origin: left;
        }

        .word-list li.struck::before {
            color: var(--found);
            content: '✓';
            font-size: 1.2rem;
        }

        .btn {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 12px 20px;
            font-size: 1.1rem;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            margin-top: 10px;
        }

        .btn:hover {
            background-color: var(--primary-hover);
            transform: translateY(-2px);
        }

        .btn:active {
            transform: translateY(0);
        }

        /* Animação quando encontra uma palavra */
        @keyframes pop {
            0% { transform: scale(1); }
            50% { transform: scale(1.2); }
            100% { transform: scale(1); }
        }

        @media (max-width: 768px) {
            .cell { width: 30px; height: 30px; font-size: 1rem; }
            .game-container { flex-direction: column; align-items: center; }
            .sidebar { width: 100%; min-width: auto; }
        }
    </style>
</head>
<body>

    <header>
        <h1>Caça-Palavras Web</h1>
        <p class="subtitle">Encontre todas as palavras escondidas</p>
    </header>

    <div class="game-container">
        <div class="board-wrapper">
            <div id="grid" class="grid"></div>
        </div>

        <div class="sidebar">
            <h3>Palavras</h3>
            <ul id="word-list" class="word-list"></ul>
            <button class="btn" id="restart-btn">Novo Jogo</button>
        </div>
    </div>

    <script>
        // Configurações do Jogo
        const GRID_SIZE = 12;
        const WORDS = ["CODIGO", "DESIGN", "FRONTEND", "LOGICA", "FUTURO", "CRIATIVO", "SISTEMA", "MODERNO"];
        const ALPHABET = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
        
        let grid = [];
        let wordsToFind = [];
        let foundWords = 0;
        
        // Variáveis para a mecânica de seleção
        let isSelecting = false;
        let startCell = null;
        let currentSelection = [];

        // Elementos do DOM
        const gridElement = document.getElementById('grid');
        const wordListElement = document.getElementById('word-list');
        const restartBtn = document.getElementById('restart-btn');

        // Inicializa o jogo
        function initGame() {
            grid = Array.from({ length: GRID_SIZE }, () => Array(GRID_SIZE).fill(''));
            wordsToFind = [...WORDS];
            foundWords = 0;
            
            placeWords();
            fillEmptyCells();
            renderGrid();
            renderWordList();
        }

        // Tenta posicionar todas as palavras na matriz
        function placeWords() {
            wordsToFind.forEach(word => {
                let placed = false;
                let attempts = 0;
                
                while (!placed && attempts < 100) {
                    // Direções: 0=Horizontal, 1=Vertical, 2=Diagonal
                    const dir = Math.floor(Math.random() * 3);
                    const row = Math.floor(Math.random() * GRID_SIZE);
                    const col = Math.floor(Math.random() * GRID_SIZE);
                    
                    if (canPlaceWord(word, row, col, dir)) {
                        for (let i = 0; i < word.length; i++) {
                            const r = dir === 1 || dir === 2 ? row + i : row;
                            const c = dir === 0 || dir === 2 ? col + i : col;
                            grid[r][c] = word[i];
                        }
                        placed = true;
                    }
                    attempts++;
                }
            });
        }

        // Verifica se a palavra cabe na direção escolhida sem sobrepor letras diferentes
        function canPlaceWord(word, row, col, dir) {
            if (dir === 0 && col + word.length > GRID_SIZE) return false; // Horizontal
            if (dir === 1 && row + word.length > GRID_SIZE) return false; // Vertical
            if (dir === 2 && (row + word.length > GRID_SIZE || col + word.length > GRID_SIZE)) return false; // Diagonal

            for (let i = 0; i < word.length; i++) {
                const r = dir === 1 || dir === 2 ? row + i : row;
                const c = dir === 0 || dir === 2 ? col + i : col;
                const currentCell = grid[r][c];
                
                if (currentCell !== '' && currentCell !== word[i]) {
                    return false;
                }
            }
            return true;
        }

        // Preenche os espaços vazios com letras aleatórias
        function fillEmptyCells() {
            for (let r = 0; r < GRID_SIZE; r++) {
                for (let c = 0; c < GRID_SIZE; c++) {
                    if (grid[r][c] === '') {
                        grid[r][c] = ALPHABET[Math.floor(Math.random() * ALPHABET.length)];
                    }
                }
            }
        }

        // Renderiza o HTML da grade
        function renderGrid() {
            gridElement.innerHTML = '';
            gridElement.style.gridTemplateColumns = `repeat(${GRID_SIZE}, 1fr)`;
            
            for (let r = 0; r < GRID_SIZE; r++) {
                for (let c = 0; c < GRID_SIZE; c++) {
                    const cell = document.createElement('div');
                    cell.classList.add('cell');
                    cell.dataset.row = r;
                    cell.dataset.col = c;
                    cell.textContent = grid[r][c];
                    
                    // Eventos de Mouse
                    cell.addEventListener('mousedown', handleMouseDown);
                    cell.addEventListener('mouseenter', handleMouseEnter);
                    
                    gridElement.appendChild(cell);
                }
            }
            // Evento global para soltar o mouse mesmo fora da grade
            document.addEventListener('mouseup', handleMouseUp);
        }

        // Renderiza a lista de palavras na lateral
        function renderWordList() {
            wordListElement.innerHTML = '';
            wordsToFind.forEach(word => {
                const li = document.createElement('li');
                li.id = `word-${word}`;
                li.textContent = word;
                wordListElement.appendChild(li);
            });
        }

        // --- LÓGICA DE INTERAÇÃO E SELEÇÃO ---

        function handleMouseDown(e) {
            isSelecting = true;
            startCell = { 
                r: parseInt(e.target.dataset.row), 
                c: parseInt(e.target.dataset.col) 
            };
            clearSelection();
            selectCell(e.target);
            currentSelection.push(e.target);
        }

        function handleMouseEnter(e) {
            if (!isSelecting) return;
            
            const currentR = parseInt(e.target.dataset.row);
            const currentC = parseInt(e.target.dataset.col);
            
            // Verifica se a linha formada é reta (Horizontal, Vertical ou Diagonal Exata)
            const dr = Math.abs(currentR - startCell.r);
            const dc = Math.abs(currentC - startCell.c);
            
            if (currentR === startCell.r || currentC === startCell.c || dr === dc) {
                clearSelection();
                calculatePath(startCell.r, startCell.c, currentR, currentC);
            }
        }

        function handleMouseUp() {
            if (!isSelecting) return;
            isSelecting = false;
            
            // Pega a palavra formada
            const selectedWord = currentSelection.map(cell => cell.textContent).join('');
            const reversedWord = selectedWord.split('').reverse().join(''); // Permite selecionar de trás pra frente

            if (wordsToFind.includes(selectedWord) || wordsToFind.includes(reversedWord)) {
                const validWord = wordsToFind.includes(selectedWord) ? selectedWord : reversedWord;
                markAsFound(validWord);
            } else {
                clearSelection();
            }
            
            startCell = null;
        }

        // Calcula e destaca o caminho entre o primeiro clique e a posição atual do mouse
        function calculatePath(r1, c1, r2, c2) {
            const rowStep = r1 === r2 ? 0 : (r2 > r1 ? 1 : -1);
            const colStep = c1 === c2 ? 0 : (c2 > c1 ? 1 : -1);
            
            let r = r1;
            let c = c1;
            
            currentSelection = [];
            
            // Traça a linha até o destino
            while (true) {
                const cell = document.querySelector(`.cell[data-row="${r}"][data-col="${c}"]`);
                if (cell) {
                    selectCell(cell);
                    currentSelection.push(cell);
                }
                
                if (r === r2 && c === c2) break;
                
                r += rowStep;
                c += colStep;
            }
        }

        function selectCell(cell) {
            if (!cell.classList.contains('found')) {
                cell.classList.add('selecting');
            }
        }

        function clearSelection() {
            currentSelection.forEach(cell => {
                cell.classList.remove('selecting');
            });
            currentSelection = [];
        }

        // Marca a palavra como encontrada na grade e na lista
        function markAsFound(word) {
            currentSelection.forEach(cell => {
                cell.classList.remove('selecting');
                cell.classList.add('found');
            });
            
            const li = document.getElementById(`word-${word}`);
            if (li && !li.classList.contains('struck')) {
                li.classList.add('struck');
                foundWords++;
                
                if (foundWords === wordsToFind.length) {
                    setTimeout(() => alert('🎉 Parabéns! Você encontrou todas as palavras!'), 500);
                }
            }
            
            // Remove a palavra do array para não selecionar duas vezes
            wordsToFind = wordsToFind.filter(w => w !== word);
            currentSelection = [];
        }

        // Reiniciar
        restartBtn.addEventListener('click', initGame);

        // Inicia na primeira carga
        initGame();

    </script>
</body>
</html>
